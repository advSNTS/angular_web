apiVersion: apps/v1
kind: Deployment
metadata:
  name: angular-web
  namespace: grupo11
  labels:
    app: angular-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: angular-web
  template:
    metadata:
      labels:
        app: angular-web
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: angular-web
        image: ghcr.io/advsnts/angular-web:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: angular-web
  namespace: grupo11
spec:
  selector:
    app: angular-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: angular-web
  namespace: grupo11
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: grupo11.inphotech.co
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: angular-web
            port:
              number: 80