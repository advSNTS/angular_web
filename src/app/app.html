<div style="text-align: center; padding: 20px; font-family: sans-serif;">
  <h1>{{ titulo }}</h1>
  <p>Profesor: <strong>{{ nombreProfesor }}</strong></p>
  <p>Capacidad: {{ cantidadEstudiantes }} alumnos</p>
  
  <hr>

  <h2>Lista de Alumnos Inscritos</h2>
  
  <table style="width: 100%; border-collapse: collapse; margin-top: 10px;">
    <thead>
      <tr style="background-color: #f0f0f0;">
        <th>ID</th>
        <th>Nombre</th>
        <th>Carrera</th>
      </tr>
    </thead>
    <tbody>
      @for (item of estudiantes; track item.id) {
        <tr>
          <td style="border: 1px solid #ddd; padding: 8px;">{{ item.id }}</td>
          <td style="border: 1px solid #ddd; padding: 8px;">{{ item.nombre }}</td>
          <td style="border: 1px solid #ddd; padding: 8px;">{{ item.carrera }}</td>
        </tr>
      }
    </tbody>
  </table>
</div>

<router-outlet></router-outlet>
